<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>OpenChat</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0a0f;color:#fff;height:100dvh;overflow:hidden}

    #login{display:flex;align-items:center;justify-content:center;height:100dvh;background:linear-gradient(135deg,#0a0a0f,#1a1a2e)}
    .login-box{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:24px;padding:40px;width:90%;max-width:360px;text-align:center;backdrop-filter:blur(20px)}
    .login-box h1{font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,#e94560,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .login-box p{color:rgba(255,255,255,.4);font-size:13px;margin-bottom:24px}
    .login-box input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);color:#fff;font-size:16px;outline:none}
    .login-box input:focus{border-color:#e94560}
    .login-box input::placeholder{color:rgba(255,255,255,.2)}
    .login-box button{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#e94560,#ff6b81);color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:12px}

    #chat{display:none;height:100dvh}
    .layout{display:flex;height:100dvh}
    .sidebar{width:260px;background:rgba(255,255,255,.02);border-right:1px solid rgba(255,255,255,.04);display:flex;flex-direction:column;flex-shrink:0}
    .sidebar-head{padding:16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;justify-content:space-between}
    .sidebar-head h2{font-size:16px;background:linear-gradient(135deg,#e94560,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .close-btn{display:none;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
    .ch-list{flex:1;overflow-y:auto;padding:8px}
    .ch{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer}
    .ch:active{background:rgba(233,69,96,.15)}
    .ch.on{background:rgba(233,69,96,.15)}
    .ch-ico{font-size:18px;width:28px;text-align:center}
    .ch-name{font-size:13px;color:rgba(255,255,255,.7)}
    .ch.on .ch-name{color:#fff}
    .add-ch{margin:8px;padding:10px;border-radius:10px;border:1px dashed rgba(255,255,255,.1);cursor:pointer;text-align:center;font-size:12px;color:rgba(255,255,255,.3)}

    .main{flex:1;display:flex;flex-direction:column;min-width:0}
    .head{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04);display:flex;align-items:center;gap:12px}
    .hamburger{display:none;background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:4px 8px}
    .head-ico{font-size:20px}
    .head-info h3{font-size:15px}
    .head-info p{font-size:11px;color:rgba(255,255,255,.3)}

    .msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:4px}
    .msg{padding:8px 12px;border-radius:12px;max-width:80%;animation:fadeIn .15s}
    .msg-sys{background:rgba(255,255,255,.02);color:rgba(255,255,255,.3);font-size:12px;font-style:italic;padding:6px 12px;max-width:100%;text-align:center}
    .msg-h{display:flex;align-items:center;gap:8px;margin-bottom:2px}
    .msg-n{font-size:13px;font-weight:600}
    .msg-t{font-size:10px;color:rgba(255,255,255,.2)}
    .msg-b{font-size:14px;line-height:1.5;word-break:break-word;color:rgba(255,255,255,.85)}
    .empty{display:flex;align-items:center;justify-content:center;height:100%;color:rgba(255,255,255,.15);font-size:14px}

    .input{padding:12px;border-top:1px solid rgba(255,255,255,.04);display:flex;gap:10px;padding-bottom:calc(12px + env(safe-area-inset-bottom,0px))}
    .input input{flex:1;padding:12px;border-radius:12px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);color:#fff;font-size:16px;outline:none}
    .input input:focus{border-color:#e94560}
    .input button{padding:12px 24px;border-radius:12px;border:none;background:linear-gradient(135deg,#e94560,#ff6b81);color:#fff;font-size:14px;font-weight:600;cursor:pointer}

    .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
    .overlay.on{display:block}
    .modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;align-items:center;justify-content:center}
    .modal-bg.on{display:flex}
    .modal{background:#1a1a2e;border:1px solid rgba(255,255,255,.06);border-radius:16px;padding:24px;width:90%;max-width:320px}
    .modal h3{margin-bottom:16px;font-size:16px}
    .modal input{width:100%;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.04);color:#fff;font-size:14px;margin-bottom:10px;outline:none}
    .modal input:focus{border-color:#e94560}
    .modal-acts{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
    .modal-acts button{padding:8px 16px;border-radius:8px;border:none;cursor:pointer;font-size:13px}
    .btn-no{background:rgba(255,255,255,.06);color:#fff}
    .btn-yes{background:#e94560;color:#fff}

    @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}

    @media(max-width:768px){
      .sidebar{display:none;position:fixed;z-index:100;width:100%;height:100%;top:0;left:0;background:#0a0a0f}
      .sidebar.open{display:flex}
      .close-btn{display:block}
      .hamburger{display:block}
      .msgs{padding:12px}
      .input{padding:8px;padding-bottom:calc(8px + env(safe-area-inset-bottom,8px))}
      .input input{padding:14px}
      .msg{max-width:90%}
      .ch{padding:14px 16px;font-size:15px}
    }
  </style>
</head>
<body>
  <div id="login">
    <div class="login-box">
      <h1>OpenChat</h1>
      <p>Анонимный чат — просто ник и в чат</p>
      <input type="text" id="nick" placeholder="Твой ник" maxlength="20" autocomplete="off">
      <button id="go">Войти</button>
    </div>
  </div>

  <div id="chat">
    <div class="layout">
      <div class="sidebar" id="sb">
        <div class="sidebar-head">
          <h2>OpenChat</h2>
          <button class="close-btn" onclick="toggleSb()">✕</button>
        </div>
        <div class="ch-list" id="chList"></div>
        <div class="add-ch" onclick="showModal()">+ Создать канал</div>
      </div>
      <div class="main">
        <div class="head">
          <button class="hamburger" onclick="toggleSb()">☰</button>
          <span class="head-ico" id="hIco">💬</span>
          <div class="head-info"><h3 id="hName">Выбери канал</h3><p id="hDesc"></p></div>
        </div>
        <div class="msgs" id="msgs"><div class="empty" id="empty">Выбери канал слева</div></div>
        <div class="input">
          <input type="text" id="inp" placeholder="Сообщение..." maxlength="2000" autocomplete="off">
          <button id="send">→</button>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay" id="ov" onclick="toggleSb()"></div>
  <div class="modal-bg" id="mBg">
    <div class="modal">
      <h3>Новый канал</h3>
      <input type="text" id="mName" placeholder="Название" maxlength="30">
      <input type="text" id="mIco" placeholder="Иконка" value="💬" maxlength="2">
      <input type="text" id="mDesc" placeholder="Описание" maxlength="100">
      <div class="modal-acts">
        <button class="btn-no" onclick="hideModal()">Отмена</button>
        <button class="btn-yes" onclick="createCh()">Создать</button>
      </div>
    </div>
  </div>

<script>
let ws, nick, ch = null;

document.getElementById('go').onclick = join;
document.getElementById('nick').onkeydown = e => { if (e.key === 'Enter') join(); };

function join() {
  nick = document.getElementById('nick').value.trim();
  if (!nick) return;
  document.getElementById('login').style.display = 'none';
  document.getElementById('chat').style.display = 'block';
  connect();
}

function connect() {
  ws = new WebSocket(`ws://${location.host}`);
  ws.onopen = () => { loadChannels(); };
  ws.onmessage = e => { onMsg(JSON.parse(e.data)); };
  ws.onclose = () => { setTimeout(connect, 2000); };
}

function onMsg(m) {
  if (m.type === 'history') {
    clearMsgs();
    m.messages.forEach(msg => appendMsg(msg));
    if (m.messages.length === 0) {
      document.getElementById('msgs').innerHTML = '<div class="empty" id="empty">Начни общаться</div>';
    }
  } else if (m.type === 'message' && m.message.channel === ch) {
    appendMsg(m.message);
  } else if (m.type === 'user_joined') {
    appendSys(m.nickname + ' зашёл');
  } else if (m.type === 'user_left') {
    appendSys(m.nickname + ' вышел');
  } else if (m.type === 'users') {
    const empty = document.getElementById('empty');
    if (empty && m.users.length > 0) empty.textContent = m.users.length + ' в чате';
  } else if (m.type === 'channel_created') {
    loadChannels();
  } else if (m.type === 'channel_deleted') {
    loadChannels();
    if (m.channelId === ch) { ch = null; clearMsgs(); }
  }
}

function loadChannels() {
  fetch('/api/channels').then(r => r.json()).then(list => {
    document.getElementById('chList').innerHTML = list.map(c =>
      `<div class="ch ${c.id === ch ? 'on' : ''}" onclick="pickCh('${c.id}')"><span class="ch-ico">${c.icon}</span><span class="ch-name">${esc(c.name)}</span></div>`
    ).join('');
    if (list.length && !ch) pickCh(list[0].id);
  });
}

function pickCh(id) {
  ch = id;
  clearMsgs();
  if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'join', nickname: nick, channel: id }));
  toggleSb();
  fetch('/api/channels').then(r => r.json()).then(list => {
    const c = list.find(x => x.id === id);
    if (c) { document.getElementById('hIco').textContent = c.icon; document.getElementById('hName').textContent = c.name; document.getElementById('hDesc').textContent = c.description; }
    document.getElementById('chList').innerHTML = list.map(x =>
      `<div class="ch ${x.id === ch ? 'on' : ''}" onclick="pickCh('${x.id}')"><span class="ch-ico">${x.icon}</span><span class="ch-name">${esc(x.name)}</span></div>`
    ).join('');
  });
}

function sendMsg() {
  const inp = document.getElementById('inp');
  const t = inp.value.trim();
  if (!t) return;
  if (!ws || ws.readyState !== 1) return;
  ws.send(JSON.stringify({ type: 'message', text: t }));
  appendMsg({ nickname: nick, text: t, color: '#e94560', timestamp: Date.now() });
  inp.value = '';
}

function appendMsg(m) {
  const el = document.getElementById('msgs');
  const empty = document.getElementById('empty');
  if (empty) empty.remove();
  const time = new Date(m.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  el.innerHTML += `<div class="msg"><div class="msg-h"><span class="msg-n" style="color:${m.color}">${esc(m.nickname)}</span><span class="msg-t">${time}</span></div><div class="msg-b">${esc(m.text)}</div></div>`;
  el.scrollTop = el.scrollHeight;
}

function appendSys(t) {
  const el = document.getElementById('msgs');
  const empty = document.getElementById('empty');
  if (empty) empty.remove();
  el.innerHTML += `<div class="msg msg-sys">${esc(t)}</div>`;
}

function clearMsgs() {
  document.getElementById('msgs').innerHTML = '<div class="empty" id="empty">Начни общаться</div>';
}

function toggleSb() { document.getElementById('sb').classList.toggle('open'); document.getElementById('ov').classList.toggle('on'); }
function showModal() { document.getElementById('mBg').classList.add('on'); document.getElementById('mName').focus(); }
function hideModal() { document.getElementById('mBg').classList.remove('on'); document.getElementById('mName').value = ''; document.getElementById('mDesc').value = ''; }
function createCh() {
  const n = document.getElementById('mName').value.trim();
  if (!n) return;
  fetch('/api/channels', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ name: n, icon: document.getElementById('mIco').value.trim() || '💬', description: document.getElementById('mDesc').value.trim() }) })
    .then(r => r.json()).then(c => { if (c.id) { hideModal(); pickCh(c.id); } });
}

function esc(s) { return String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

document.getElementById('send').onclick = sendMsg;
document.getElementById('inp').onkeydown = e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } };
</script>
</body>
</html>
