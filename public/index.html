<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>OpenChat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #fff; height: 100vh; height: 100dvh; overflow: hidden; }
    
    #login-screen {
      display: flex; align-items: center; justify-content: center;
      height: 100vh; height: 100dvh; background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
    }
    .login-box {
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px; padding: 40px; width: 90%; max-width: 360px; text-align: center;
      backdrop-filter: blur(20px);
    }
    .login-box h1 { font-size: 28px; margin-bottom: 8px; background: linear-gradient(135deg, #e94560, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-box p { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 24px; }
    .login-box input {
      width: 100%; padding: 14px 18px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04); color: #fff; font-size: 16px; outline: none;
    }
    .login-box input:focus { border-color: #e94560; }
    .login-box input::placeholder { color: rgba(255,255,255,0.2); }
    .login-box button {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #e94560, #ff6b81); color: #fff;
      font-size: 15px; font-weight: 600; cursor: pointer; margin-top: 12px;
    }
    .login-box button:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(233,69,96,0.4); }
    .login-box .stats { margin-top: 20px; display: flex; justify-content: center; gap: 20px; }
    .login-box .stat { text-align: center; }
    .login-box .stat-num { font-size: 20px; font-weight: 700; color: #e94560; }
    .login-box .stat-label { font-size: 11px; color: rgba(255,255,255,0.3); }
    
    #chat-screen { display: none; height: 100vh; height: 100dvh; }
    .chat-layout { display: flex; height: 100vh; height: 100dvh; }
    
    .sidebar {
      width: 260px; background: rgba(255,255,255,0.02); border-right: 1px solid rgba(255,255,255,0.04);
      display: flex; flex-direction: column;
    }
    .sidebar-header {
      padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-header h2 { font-size: 16px; background: linear-gradient(135deg, #e94560, #ff6b81); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .sidebar-close { display: none; background: none; border: none; color: #fff; font-size: 24px; cursor: pointer; }
    .channels { flex: 1; overflow-y: auto; padding: 8px; }
    .channel {
      display: flex; align-items: center; gap: 10px; padding: 10px 12px;
      border-radius: 10px; cursor: pointer; transition: all 0.15s;
    }
    .channel:hover { background: rgba(255,255,255,0.04); }
    .channel.active { background: rgba(233,69,96,0.15); }
    .channel-icon { font-size: 18px; width: 28px; text-align: center; }
    .channel-name { font-size: 13px; color: rgba(255,255,255,0.7); }
    .channel.active .channel-name { color: #fff; }
    .create-channel {
      margin: 8px; padding: 10px; border-radius: 10px; border: 1px dashed rgba(255,255,255,0.1);
      cursor: pointer; text-align: center; font-size: 12px; color: rgba(255,255,255,0.3);
    }
    .create-channel:hover { border-color: #e94560; color: #e94560; }
    
    .main-chat { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-header {
      padding: 14px 20px; border-bottom: 1px solid rgba(255,255,255,0.04);
      display: flex; align-items: center; gap: 12px;
    }
    .chat-header-icon { font-size: 20px; }
    .chat-header-info h3 { font-size: 15px; }
    .chat-header-info p { font-size: 11px; color: rgba(255,255,255,0.3); }
    
    .messages { flex: 1; overflow-y: auto; padding: 16px 20px; display: flex; flex-direction: column; gap: 4px; }
    .msg { padding: 8px 12px; border-radius: 12px; max-width: 80%; animation: fadeIn 0.15s ease-out; }
    .msg:hover { background: rgba(255,255,255,0.02); }
    .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
    .msg-nick { font-size: 13px; font-weight: 600; }
    .msg-time { font-size: 10px; color: rgba(255,255,255,0.2); }
    .msg-text { font-size: 14px; line-height: 1.5; word-break: break-word; color: rgba(255,255,255,0.85); }
    .msg-system { background: rgba(255,255,255,0.02); color: rgba(255,255,255,0.3); font-size: 12px; font-style: italic; padding: 6px 12px; max-width: 100%; }
    
    .typing-indicator { padding: 4px 20px; font-size: 11px; color: rgba(255,255,255,0.2); min-height: 20px; }
    
    .input-area {
      padding: 12px 16px; border-top: 1px solid rgba(255,255,255,0.04);
      display: flex; gap: 10px;
      padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
    }
    .input-area input {
      flex: 1; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04); color: #fff; font-size: 16px; outline: none;
    }
    .input-area input:focus { border-color: #e94560; }
    .input-area input::placeholder { color: rgba(255,255,255,0.2); }
    .input-area button {
      padding: 12px 24px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #e94560, #ff6b81); color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
    }
    
    .menu-btn {
      display: none; background: none; border: none; color: #fff;
      font-size: 22px; cursor: pointer; padding: 4px 8px;
    }
    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 99; }
    .overlay.open { display: block; }
    
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 200; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1a1a2e; border: 1px solid rgba(255,255,255,0.06);
      border-radius: 16px; padding: 24px; width: 90%; max-width: 320px;
    }
    .modal h3 { margin-bottom: 16px; font-size: 16px; }
    .modal input {
      width: 100%; padding: 10px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.04); color: #fff; font-size: 14px; margin-bottom: 10px; outline: none;
    }
    .modal input:focus { border-color: #e94560; }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 12px; }
    .modal-actions button { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; }
    .btn-cancel { background: rgba(255,255,255,0.06); color: #fff; }
    .btn-create { background: #e94560; color: #fff; }
    
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    
    @media (max-width: 768px) {
      .sidebar {
        display: none; position: fixed; z-index: 100; width: 100%; height: 100%;
        top: 0; left: 0; background: #0a0a0f;
      }
      .sidebar.open { display: flex; }
      .sidebar-close { display: block; }
      .menu-btn { display: block; }
      .messages { padding: 12px; }
      .input-area { padding: 8px; padding-bottom: calc(8px + env(safe-area-inset-bottom, 8px)); }
      .input-area input { padding: 14px; }
      .msg { max-width: 90%; }
      .channel { padding: 14px 16px; font-size: 15px; }
      .chat-header { padding: 12px 14px; }
    }
  </style>
</head>
<body>
  <div id="login-screen">
    <div class="login-box">
      <h1>OpenChat</h1>
      <p>Анонимный чат без регистрации</p>
      <input type="text" id="nickname-input" placeholder="Твой ник" maxlength="20">
      <button id="join-btn">Войти</button>
    </div>
  </div>
  
  <div id="chat-screen">
    <div class="chat-layout">
      <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <h2>OpenChat</h2>
          <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
        </div>
        <div class="channels" id="channels"></div>
        <div class="create-channel" onclick="showCreateModal()">+ Создать канал</div>
      </div>
      <div class="main-chat">
        <div class="chat-header">
          <button class="menu-btn" onclick="toggleSidebar()">☰</button>
          <span class="chat-header-icon" id="channel-icon">💬</span>
          <div class="chat-header-info">
            <h3 id="channel-name">Выбери канал</h3>
            <p id="channel-desc"></p>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="typing-indicator" id="typing"></div>
        <div class="input-area">
          <input type="text" id="msg-input" placeholder="Сообщение..." maxlength="2000" autocomplete="off">
          <button id="send-btn">→</button>
        </div>
      </div>
    </div>
  </div>
  
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
  
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <h3>Новый канал</h3>
      <input type="text" id="ch-name" placeholder="Название" maxlength="30">
      <input type="text" id="ch-icon" placeholder="Иконка" value="💬" maxlength="2">
      <input type="text" id="ch-desc" placeholder="Описание" maxlength="100">
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeCreateModal()">Отмена</button>
        <button class="btn-create" onclick="createChannel()">Создать</button>
      </div>
    </div>
  </div>

  <script>
    let ws = null;
    let nickname = '';
    let currentChannel = null;
    
    // Login
    document.getElementById('join-btn').onclick = join;
    document.getElementById('nickname-input').onkeydown = (e) => { if (e.key === 'Enter') join(); };
    
    function join() {
      nickname = document.getElementById('nickname-input').value.trim();
      if (!nickname) return;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'block';
      connect();
    }
    
    // WebSocket
    function connect() {
      ws = new WebSocket(`ws://${location.host}`);
      
      ws.onopen = () => {
        console.log('WS connected');
        loadChannels();
      };
      
      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleWS(msg);
      };
      
      ws.onclose = () => {
        console.log('WS disconnected, reconnecting...');
        setTimeout(connect, 2000);
      };
      
      ws.onerror = (err) => {
        console.log('WS error:', err);
      };
    }
    
    function handleWS(msg) {
      switch (msg.type) {
        case 'welcome':
          break;
        case 'message':
          if (msg.message.channel === currentChannel) {
            appendMessage(msg.message);
          }
          break;
        case 'user_joined':
          if (msg.channel === currentChannel) {
            appendSystem(msg.nickname + ' зашёл');
          }
          break;
        case 'user_left':
          appendSystem(msg.nickname + ' вышел');
          break;
        case 'users':
          if (msg.users && msg.users[0] && msg.users[0].channel === currentChannel) {
            renderUsers(msg.users);
          }
          break;
        case 'channel_created':
          loadChannels();
          break;
        case 'channel_deleted':
          loadChannels();
          if (msg.channelId === currentChannel) {
            currentChannel = null;
            document.getElementById('channel-name').textContent = 'Выбери канал';
            document.getElementById('messages').innerHTML = '';
          }
          break;
      }
    }
    
    // Channels
    function loadChannels() {
      fetch('/api/channels').then(r => r.json()).then(chs => {
        renderChannels(chs);
        if (chs.length > 0 && !currentChannel) {
          switchChannel(chs[0].id);
        }
      });
    }
    
    function renderChannels(chs) {
      document.getElementById('channels').innerHTML = chs.map(ch =>
        `<div class="channel ${ch.id === currentChannel ? 'active' : ''}" onclick="switchChannel('${ch.id}')">
          <span class="channel-icon">${ch.icon}</span>
          <span class="channel-name">${esc(ch.name)}</span>
        </div>`
      ).join('');
    }
    
    function switchChannel(id) {
      currentChannel = id;
      document.getElementById('messages').innerHTML = '';
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'join', nickname, channel: id }));
      }
      toggleSidebar();
      
      fetch('/api/channels').then(r => r.json()).then(chs => {
        const ch = chs.find(c => c.id === id);
        if (ch) {
          document.getElementById('channel-icon').textContent = ch.icon;
          document.getElementById('channel-name').textContent = ch.name;
          document.getElementById('channel-desc').textContent = ch.description;
        }
        renderChannels(chs);
      });
    }
    
    // Messages
    function sendMessage() {
      const input = document.getElementById('msg-input');
      const text = input.value.trim();
      if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'message', text }));
      input.value = '';
    }
    
    function appendMessage(msg) {
      const el = document.getElementById('messages');
      const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      el.innerHTML += `<div class="msg">
        <div class="msg-header">
          <span class="msg-nick" style="color:${msg.color}">${esc(msg.nickname)}</span>
          <span class="msg-time">${time}</span>
        </div>
        <div class="msg-text">${esc(msg.text)}</div>
      </div>`;
      el.scrollTop = el.scrollHeight;
    }
    
    function appendSystem(text) {
      document.getElementById('messages').innerHTML += `<div class="msg msg-system">${esc(text)}</div>`;
    }
    
    function renderUsers(users) {
      document.getElementById('users-list').innerHTML = users.map(u =>
        `<div class="user-item"><span class="user-dot" style="background:${u.color}"></span>${esc(u.nickname)}</div>`
      ).join('');
    }
    
    // UI
    function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('open');
      document.getElementById('overlay').classList.toggle('open');
    }
    
    function showCreateModal() {
      document.getElementById('create-modal').classList.add('open');
      document.getElementById('ch-name').focus();
    }
    
    function closeCreateModal() {
      document.getElementById('create-modal').classList.remove('open');
      document.getElementById('ch-name').value = '';
      document.getElementById('ch-desc').value = '';
    }
    
    function createChannel() {
      const name = document.getElementById('ch-name').value.trim();
      const icon = document.getElementById('ch-icon').value.trim() || '💬';
      const desc = document.getElementById('ch-desc').value.trim();
      if (!name) return;
      fetch('/api/channels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, icon, description: desc }),
      }).then(r => r.json()).then(ch => {
        if (ch.id) {
          closeCreateModal();
          switchChannel(ch.id);
        }
      });
    }
    
    function esc(s) { return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    
    // Send
    document.getElementById('send-btn').onclick = sendMessage;
    document.getElementById('msg-input').onkeydown = (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    };
  </script>
</body>
</html>
